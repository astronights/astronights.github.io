about: |
  I've always been drawn to problems that sit at the intersection of data and the real world, where the right insight or the right model can meaningfully change an outcome.

  My professional journey has taken me from JP Morgan Chase in Hong Kong to OCBC, GIC and now Barclays in Singapore, building data and AI systems across trading, banking and investment management. The work has spanned everything from recommendation engines and forecasting models to LLM agents and agentic AI pipelines.

  Equipped with a Masters in Artificial Intelligence and a Bachelor's in Computer Science with minors in Finance and French, I have a solid foundation in engineering and mathematics, backed by several accolades including university scholarships and Dean's Honour Lists.

  Outside of work I'm an avid quizzer and puzzle hunter, a language enthusiast fascinated by etymology and linguistics, and someone who is always finding something new to discover in the cities around them.

